<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <title>HealthDiary</title>
  </head>

  <body>
    <div class="container">
      <div class="navbar">
        <h2 class="logo">HealthDiary</h2>
        <nav>
          <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="entries.html">Diary</a></li>
            <li><a href="workouts.html">Workouts</a></li>
            <li><a href="goals.html">Goals</a></li>
            <li><a href="bmi.html">Progress</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#" id="logout-btn">Logout</a></li>
          </ul>
        </nav>
        <button class="menu-toggle">
          <span></span>
        </button>
      </div>
    </div>
    <main class="dashboard workouts-page">
      <header class="page-header">
        <div>
          <h1>Workouts</h1>
          <p>Lisää ja tarkastele treenejäsi</p>
        </div>
    
        <div class="toolbar">
          <div class="pill">Hei, <span id="username"></span> 👋</div>
          <button id="add-workout-btn" class="btn btn-primary">+ Add workout</button>
        </div>
      </header>
    
      <section class="cards-row">
        <div id="cardworkout" class="card stat-card">
          <h3>Viimeisin treeni</h3>
          <p class="stat-main">—</p>
          <span class="stat-sub">—</span>
          <div class="stat-extra" id="cardworkout-extra"></div>
        </div>
    
        <div id="cardweight" class="card stat-card">
          <h3>Paino</h3>
          <p class="stat-main">—</p>
          <span class="stat-sub">—</span>
        </div>
    
        <div id="cardgoals" class="card stat-card">
          <h3>Tavoite</h3>
          <p class="stat-main">—</p>
          <span class="stat-sub">—</span>
        </div>
      </section>
    
      <section class="workouts-section">
        <div class="section-head">
          <h2>Treeni-historia</h2>
          <div class="filters">
            <input id="search" class="input" placeholder="Hae liikkeellä (esim. Bench)..." />
          </div>
        </div>
    
        <div id="workout-list" class="workout-grid"></div>
        <p id="empty-state" class="empty-state hidden">Ei treenejä vielä. Lisää ensimmäinen treeni 👇</p>
      </section>
    
      <!-- MODAL -->
      <div id="workout-modal" class="modal modal-hidden">
        <div class="modal-content">
          <div class="modal-head">
            <h2>Add workout</h2>
            <button id="close-workout" class="icon-btn" type="button">✕</button>
          </div>
    
          <label class="label">Exercise</label>
          <input id="exercise" class="input" placeholder="e.g. Shoulder press" />
    
          <div class="grid-3">
            <div>
              <label class="label">Weight (kg)</label>
              <input id="weight" class="input" type="number" step="0.5" placeholder="e.g. 40" />
            </div>
            <div>
              <label class="label">Reps</label>
              <input id="reps" class="input" type="number" placeholder="e.g. 8" />
            </div>
            <div>
              <label class="label">Sets</label>
              <input id="sets" class="input" type="number" placeholder="e.g. 3" />
            </div>
          </div>
    
          <label class="label">Date</label>
          <input id="workout-date" class="input" type="date" />
    
          <div class="modal-actions">
            <button id="save-workout" class="btn btn-primary" type="button">Save</button>
            <button id="cancel-workout" class="btn" type="button">Cancel</button>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/auth.js"></script>
    <script type="module" src="/src/js/workouts.js"></script>
  </body>
</html>
